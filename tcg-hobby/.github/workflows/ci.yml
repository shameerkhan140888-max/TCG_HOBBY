name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://tcg_hobby:tcg_hobby@localhost:5432/tcg_hobby?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tcg_hobby
          POSTGRES_PASSWORD: tcg_hobby
          POSTGRES_DB: tcg_hobby
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tcg_hobby"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - working-directory: tcg-hobby
        run: npm install
      - working-directory: tcg-hobby
        run: npm run db:generate
      - working-directory: tcg-hobby
        run: npm run typecheck
      - working-directory: tcg-hobby
        run: npm run test
      - working-directory: tcg-hobby
        run: npm run build
