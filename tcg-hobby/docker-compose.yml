services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tcg_hobby
      POSTGRES_PASSWORD: tcg_hobby
      POSTGRES_DB: tcg_hobby
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcg_hobby"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
